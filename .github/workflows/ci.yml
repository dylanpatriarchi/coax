name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # esbuild (pulled in by vitest/tsx) needs its postinstall to run.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Attacks and oracles must be fully offline in CI — no network, no live model.
      - name: Test (offline)
        run: npm test
        env:
          GAUNTLET_OFFLINE: '1'

      - name: Build
        run: npm run build
